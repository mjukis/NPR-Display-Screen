<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* video background */
#background-video {

  width: 100vw;
  height: 100vh;
  object-fit: cover;
  position: fixed;
  left: 0;
  right: 0;
  top: 0;
  bottom: 0;
  z-index: -1;
}

/* page content */

body {
  background-color:rgb(0, 0, 0);
  font-family: Trebuchet MS;
  margin: 0;
  padding: 0;

}

h1, h2 {
  color: white;
  font-weight: bold;
  text-align: center;
}

h1 {
  margin: 0;
  position: absolute;
  top: 1vw;
  right: 1vw;
  filter: drop-shadow(3px 3px 5px rgba(0, 0, 0, 0.5));
}

h1 img {
  width: 10vw; /* 10% of the screen width */
  height: auto; /* Maintain aspect ratio */
}



h2 { font-size: 3rem; }

canvas {
    padding-left: 0;
    padding-right: 0;
    margin-left: auto;
    margin-right: auto;
    display: block;
    background-color:#fff,0;
    height: 10vw;
    width: 20vw;
}

@media (max-width: 750px) {

    #background-video { display: none; }
    body {
      background: url("images/npr-logo-transparent.png") no-repeat;
      background-color:rgb(0, 0, 0);
      background-size: cover;
    }
    h1 {
      right: 0;
    }
    h1 img {
      width: 0; /* 10% of the screen width */
      height: auto; /* Maintain aspect ratio */
    }
    canvas {
      height: 0;
      width: 0;
    }
}

main {
  background: linear-gradient(
  to bottom,
  #00000000,
  #0000008a,
  #000000c2);
  font-size: 3vw;
  color: rgb(135, 221, 255); 
  text-shadow: 5px 5px black;
  -webkit-text-stroke: 2px rgba(0, 0, 0, 0.6);
  padding: 10px;
  padding-left: 20px;
  position: fixed; /* Fix the position at the bottom */
  bottom: 0; /* Align to the bottom of the viewport */
  left: 0;
  width: 100%; /* Full width */
  height: 45vh; /* Take up 45% of the viewport height */
  font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
  box-sizing: border-box; /* Include padding in height calculation */
}

#overlay {
  position: fixed; /* Sit on top of the page content */
  width: 100%; /* Full width (cover the whole page) */
  height: 100%; /* Full height (cover the whole page) */
  opacity: 50%;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  /*background-color: rgba(0, 255, 0, 0.5); /* Black background with opacity */
  z-index: 2; /* Specify a stack order in case you're using a different order for other elements */
  background: linear-gradient(
  to bottom,
  #5d963457,
  #5d963465 50%,
  #538c2b5e 50%,
  #00000057
);
/* The rectangle in which to repeat. 
   It can be fully wide in this case */
background-size: 100% 5px;
}

</style>
<title>Neotropolis Public Radio</title>
<link rel="icon" href="https://sites.neonav.net/images/favicon.ico"></link>
</head>
<body>
  <div id="overlay"></div>
  <video id="background-video" autoplay loop muted poster="images/npr-logo-transparent.png">
    <source id="background-video-source" src="images/npr.mp4" type="video/mp4">
  </video>
  
  <h1><img src="images/npr-logo-transparent.png" alt="NPR Logo">
      <canvas id="canvas">
        Canvas is required to load clock.
      </canvas>
  </h1>

  <main>
    Now Playing:</br>
    <div id="nowPlaying" style="font-size: 3vw">NO DATA</div>
  </br>Next Up:</br>
    <div id="nextPlaying" style="font-size: 3vw">Next Up: NO DATA</div>
  </main>

  <script>   
    var nowPlaying = document.getElementById("nowPlaying"); // Set the variables for Now Playing content
    var nextPlaying = document.getElementById("nextPlaying");
    var bgVidContainer = document.getElementById("background-video");
    var bgVid = document.getElementById("background-video-source");
    var currentProgram = ""; // Set the current radio program to be unknown

    const canvas = document.getElementById("canvas"); // Set the variables for the clock
    const ctx = canvas.getContext("2d");
    let radius = canvas.height / 2;
    ctx.translate(radius*2, radius);
    radius = radius * 0.90

    // Function to fetch and update nowPlaying content
    async function updateNowPlaying() {
      try {
        let oldProgram = currentProgram;
        const response = await fetch("https://sites.neonav.net/npr_info.json"); // This file is created by the NPR Node.js server
        if (response.ok) {
          const text = await response.json();
          nowPlaying.textContent = `${text.playing}`;
          nextPlaying.textContent = `${text.next}`;
          currentProgram = `${text.program}`;
          if (currentProgram != oldProgram) { // Only update the video if the program has changed
            console.log(`Current Program: ${currentProgram}`);
            if (currentProgram == "The Human Show") {
              bgVidContainer.poster = "images/ths.png";
              bgVid.src = "images/ths.mp4"
            }
            else if (currentProgram == "LES9000 Plays Music") {
              bgVidContainer.poster = "images/lpm.png";
              bgVid.src = "images/lpm.mp4"
            }
            else if (currentProgram == "LES9000 Watches You Dance") {
              bgVidContainer.poster = "images/wyd.png";
              bgVid.src = "images/wyd.mp4"
            }
            else if (currentProgram == "LES9000 Plays Different Music") {
              bgVidContainer.poster = "images/lpdm.png";
              bgVid.src = "images/lpdm.mp4"
            }
            else if (currentProgram == "cReePeRBoT68's Sexy Sleepy-Time Sing-Along") {
              bgVidContainer.poster = "images/cb68.png";
              bgVid.src = "images/cb68.mp4"
            }
            else { // Catch-all if program has changed but isn't recognized
              bgVidContainer.poster = "images/npr-logo-transparent.png";
              bgVid.src = "images/npr.mp4"
            }
            bgVidContainer.load(); // Don't reload unless the video has changed!
          }
        } else {
          console.error("Failed to fetch now playing data:", response.status);
          nowPlaying.textContent = "Unable to fetch data";
          if (bgVid.src != "images/npr.mp4") {
            bgVidContainer.poster = "images/npr-logo-transparent.png";
            bgVid.src = "images/npr.mp4";
            bgVidContainer.load();
          }
        }
      } catch (error) {
        console.error("Error fetching now playing data:", error);
        nowPlaying.textContent = "Error fetching data";
        if (bgVid.src != "images/npr.mp4") {
          bgVidContainer.poster = "images/npr-logo-transparent.png";
          bgVid.src = "images/npr.mp4";
          bgVidContainer.load();
        }
      }
    }

    function drawClock() { // Clear out the canvas
      ctx.save();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
      drawFace(ctx, radius);
      drawNumbers(ctx, radius);
      drawTime(ctx, radius);
    }

    function drawFace(ctx, radius) { 
      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, 2*Math.PI);
      ctx.fillStyle = "rgba(255, 255, 255, 0.6)"; // Semi-transparent white background
      ctx.fill();
      ctx.strokeStyle = "#000"; // Black border
      ctx.lineWidth = radius*0.05;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(0, 0, radius*0.1, 0, 2*Math.PI); // Center circle
      ctx.fillStyle = '#000';
      ctx.fill();
    }

    function drawNumbers(ctx, radius) {
      ctx.font = radius*0.25 + "px Impact";
      ctx.textBaseline="middle";
      ctx.textAlign="center";
      for(let num = 1; num < 13; num++){ // Loop through the numbers 1-12 to draw on the clock face
        let ang = num * Math.PI / 6;
        ctx.rotate(ang);
        ctx.translate(0, -radius*0.85);
        ctx.rotate(-ang);
        ctx.fillStyle = "black";
        if(num == 12 || num == 3 || num == 6 || num == 9) { // Only draw the numbers for 12, 3, 6, and 9, to avoid cluttering the clock face
          ctx.font = radius*0.25 + "px Impact";
          ctx.fillText(num.toString(), 0, 0);
        } else {
          ctx.font = radius*0.1 + "px Impact"; // Draw smaller "O" for the other hours
          ctx.fillText("O",0,0);
        }
        ctx.rotate(ang);
        ctx.translate(0, radius*0.85);
        ctx.rotate(-ang);
      }
    }

    function drawTime(ctx, radius){
      const now = new Date();
      let hour = now.getHours();
      let minute = now.getMinutes();
      let second = now.getSeconds();
      let dcolor = "black";

      if (second == 0 && (minute == 15) || (minute == 30) || (minute == 45) || (minute == 0)) {
        console.log(`Time: ${now}`);
        console.log(`Current program: ${currentProgram}`);
      }

      //hour
      hour=hour%12;
      hour=(hour*Math.PI/6)+
      (minute*Math.PI/(6*60))+
      (second*Math.PI/(360*60));
      drawHand(ctx, hour, radius*0.5, radius*0.07, "black");
      //minute
      minute=(minute*Math.PI/30)+(second*Math.PI/(30*60));
      drawHand(ctx, minute, radius*0.8, radius*0.07, "gray");
      // second
      second=(second*Math.PI/30);
      
      drawHand(ctx, second, radius*0.9, radius*0.02, "red");
      ctx.beginPath();
      ctx.arc(0, 0, radius*0.1, 0, 2*Math.PI);
      ctx.fillStyle = 'black';
      ctx.fill();
    }

    function drawHand(ctx, pos, length, width, dcolor) {
      ctx.strokeStyle = dcolor;
      ctx.beginPath();
      ctx.lineWidth = width;
      ctx.lineCap = "butt";
      ctx.moveTo(0,0);
      ctx.rotate(pos);
      ctx.lineTo(0, -length);
      ctx.stroke();
      ctx.rotate(-pos);
    }

    // Call the function to update nowPlaying

    updateNowPlaying();
    drawClock();

    setInterval(updateNowPlaying, 5000);
    setInterval(drawClock, 1000);
  </script>
</body>
</html>
